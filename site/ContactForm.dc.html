<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/upper-kittitas-parishes-design-system-477b8592-51b9-433d-9113-714dc26ef540/ui_kits/parish_website/styles.css">
<script src="_ds/upper-kittitas-parishes-design-system-477b8592-51b9-433d-9113-714dc26ef540/_ds_bundle.js"></script>
</helmet>

<sc-if value="{{ sent }}">
  <div class="footer__signup-thanks" role="status" style="border-color:var(--color-gold-screen);background:rgba(196,168,86,0.08);color:var(--color-charcoal)">
    <div class="footer__signup-thanks-mark">✠</div>
    <div><strong style="color:var(--color-navy)">{{ successMsg }}</strong></div>
  </div>
</sc-if>
<sc-if value="{{ notSent }}" hint-placeholder-val="{{ true }}">
<form class="form" onSubmit="{{ onSubmit }}" novalidate>
  <div class="contact-form-grid">
    <div class="form__field">
      <label class="form__label" for="cf-name">Your name</label>
      <input class="form__input" id="cf-name" name="name" type="text" required value="{{ name }}" onChange="{{ onName }}" aria-required="true" aria-invalid="{{ nameInvalid }}" aria-describedby="cf-name-error" placeholder="First and last name">
      <sc-if value="{{ nameError }}"><span id="cf-name-error" class="form__help" role="alert" style="color:var(--color-lit-red)">Please tell us your name.</span></sc-if>
    </div>
    <div class="form__field">
      <label class="form__label" for="cf-email">Email</label>
      <input class="form__input" id="cf-email" name="email" type="email" required value="{{ email }}" onChange="{{ onEmail }}" aria-required="true" aria-invalid="{{ emailInvalid }}" aria-describedby="cf-email-error" placeholder="you@example.com">
      <sc-if value="{{ emailError }}"><span id="cf-email-error" class="form__help" role="alert" style="color:var(--color-lit-red)">Please enter a valid email so we can reply.</span></sc-if>
    </div>
  </div>

  <sc-if value="{{ showSelector }}" hint-placeholder-val="{{ true }}">
    <div class="form__field">
      <label class="form__label" for="cf-reason">Reason for reaching out</label>
      <select class="form__input" id="cf-reason" value="{{ reasonValue }}" onChange="{{ onReason }}">
        <option value="hello">Just saying hello</option>
        <option value="register">I'd like to register as a parishioner</option>
        <option value="prayer">Prayer request</option>
        <option value="sacrament">Planning a sacrament (baptism, marriage, funeral)</option>
        <option value="other">Something else</option>
      </select>
    </div>
  </sc-if>
  <sc-if value="{{ locked }}">
    <div class="eyebrow" style="margin-bottom:-2px">{{ staticLabel }}</div>
  </sc-if>

  <sc-if value="{{ isRegister }}">
    <div class="form__field">
      <label class="form__label" for="cf-parish">Which parish?</label>
      <select class="form__input" id="cf-parish" value="{{ parish }}" onChange="{{ onParish }}">
        <option value="">Choose a parish…</option>
        <option value="sjb">St. John the Baptist · Cle Elum</option>
        <option value="ic">Immaculate Conception · Roslyn</option>
        <option value="unsure">Not sure yet</option>
      </select>
    </div>
    <div class="form__field">
      <span class="form__label">While you're here, want emails too?</span>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
        <label style="{{ bulletinPill }}"><input type="checkbox" checked="{{ prefBulletin }}" onChange="{{ toggleBulletin }}" style="position:absolute;opacity:0;width:0;height:0"><span style="{{ bulletinBox }}"></span><span>Weekly bulletin</span></label>
        <label style="{{ newsletterPill }}"><input type="checkbox" checked="{{ prefNewsletter }}" onChange="{{ toggleNewsletter }}" style="position:absolute;opacity:0;width:0;height:0"><span style="{{ newsletterBox }}"></span><span>Quarterly newsletter</span></label>
        <label style="{{ holydaysPill }}"><input type="checkbox" checked="{{ prefHolydays }}" onChange="{{ toggleHolydays }}" style="position:absolute;opacity:0;width:0;height:0"><span style="{{ holydaysBox }}"></span><span>Holy-day reminders</span></label>
      </div>
    </div>
  </sc-if>

  <div class="form__field">
    <label class="form__label" for="cf-message">How can we help?</label>
    <textarea class="form__textarea" id="cf-message" name="message" required value="{{ message }}" onChange="{{ onMessage }}" aria-required="true" aria-invalid="{{ messageInvalid }}" aria-describedby="cf-message-error" placeholder="{{ placeholder }}"></textarea>
    <sc-if value="{{ messageError }}"><span id="cf-message-error" class="form__help" role="alert" style="color:var(--color-lit-red)">Please add a short message.</span></sc-if>
  </div>

  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <button class="btn btn--primary" type="submit">Send message</button>
    <span class="form__help">We'll reply during office hours. For anything urgent, please call (509) 674-2531.</span>
  </div>
</form>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:720,&quot;height&quot;:560},&quot;reason&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;hello&quot;,&quot;options&quot;:[&quot;hello&quot;,&quot;register&quot;,&quot;prayer&quot;,&quot;sacrament&quot;,&quot;other&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;locked&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  state = {
    reason: null,
    name: '', email: '', message: '', parish: '',
    prefs: { bulletin: false, newsletter: false, holydays: false },
    errors: {}, tried: false, sent: false,
  };

  get reasonVal() {
    return this.state.reason != null ? this.state.reason : (this.props.reason || 'hello');
  }
  get isLocked() {
    return this.props.locked === true || this.props.locked === 'true';
  }

  validEmail(v) { return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test((v || '').trim()); }

  upd(key, errKey, val) {
    this.setState((s) => {
      const errs = { ...(s.errors || {}) };
      if (s.tried) {
        const ok = errKey === 'email' ? this.validEmail(val) : !!val.trim();
        if (ok) delete errs[errKey]; else errs[errKey] = true;
      }
      return { [key]: val, errors: errs };
    });
  }

  togglePref(k) {
    this.setState((s) => ({ prefs: { ...s.prefs, [k]: !s.prefs[k] } }));
  }

  chip(on) {
    return {
      pill: 'display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;cursor:pointer;font-family:var(--font-sans);font-size:13px;letter-spacing:0.04em;user-select:none;position:relative;transition:all .15s ease;'
        + (on
          ? 'border:1px solid var(--color-gold-screen);background:rgba(196,168,86,0.12);color:var(--color-navy);'
          : 'border:1px solid var(--border-default);background:transparent;color:var(--color-charcoal);'),
      box: 'width:14px;height:14px;border-radius:3px;flex-shrink:0;display:inline-block;'
        + (on
          ? 'background:var(--color-gold-screen);border:1.5px solid var(--color-gold-screen);'
          : 'background:transparent;border:1.5px solid var(--border-default);'),
    };
  }

  renderVals() {
    const reason = this.reasonVal;
    const locked = this.isLocked;
    const e = this.state.errors || {};
    const labels = {
      hello: 'Just saying hello',
      register: "I'd like to register as a parishioner",
      prayer: 'Prayer request',
      sacrament: 'Planning a sacrament',
      other: 'Something else',
    };
    const ph = reason === 'register'
      ? 'Tell us a bit about your family, how you found us, or any questions…'
      : reason === 'prayer'
        ? 'Share your intention. All requests are kept confidential.'
        : 'Registering, planning a sacrament, a prayer request, or just saying hello…';
    const first = (this.state.name.trim().split(' ')[0]) || 'friend';
    const success = reason === 'register'
      ? ('Thank you, ' + first + '. We have your details, and someone from the parish office will reach out soon about getting you registered.')
      : reason === 'prayer'
        ? 'Thank you. Your intention has been received and will be held in prayer, in confidence.'
        : ('Thank you, ' + first + ". Your message is on its way to the parish office. We'll reply during office hours; for anything urgent, please call (509) 674-2531.");
    const cb = this.chip(this.state.prefs.bulletin);
    const cn = this.chip(this.state.prefs.newsletter);
    const ch = this.chip(this.state.prefs.holydays);

    return {
      showSelector: !locked,
      locked,
      staticLabel: labels[reason] || labels.hello,
      reasonValue: reason,
      isRegister: reason === 'register',
      placeholder: ph,
      onReason: (ev) => this.setState({ reason: ev.target.value }),

      name: this.state.name, email: this.state.email, message: this.state.message, parish: this.state.parish,
      onName: (ev) => this.upd('name', 'name', ev.target.value),
      onEmail: (ev) => this.upd('email', 'email', ev.target.value),
      onMessage: (ev) => this.upd('message', 'message', ev.target.value),
      onParish: (ev) => this.setState({ parish: ev.target.value }),

      nameError: !!e.name, emailError: !!e.email, messageError: !!e.message,
      nameInvalid: e.name ? 'true' : 'false',
      emailInvalid: e.email ? 'true' : 'false',
      messageInvalid: e.message ? 'true' : 'false',

      sent: this.state.sent, notSent: !this.state.sent, successMsg: success,

      prefBulletin: this.state.prefs.bulletin,
      prefNewsletter: this.state.prefs.newsletter,
      prefHolydays: this.state.prefs.holydays,
      toggleBulletin: () => this.togglePref('bulletin'),
      toggleNewsletter: () => this.togglePref('newsletter'),
      toggleHolydays: () => this.togglePref('holydays'),
      bulletinPill: cb.pill, bulletinBox: cb.box,
      newsletterPill: cn.pill, newsletterBox: cn.box,
      holydaysPill: ch.pill, holydaysBox: ch.box,

      onSubmit: (ev) => {
        ev.preventDefault();
        const errs = {};
        if (!this.state.name.trim()) errs.name = true;
        if (!this.validEmail(this.state.email)) errs.email = true;
        if (!this.state.message.trim()) errs.message = true;
        if (Object.keys(errs).length) { this.setState({ errors: errs, tried: true }); return; }
        this.setState({ sent: true });
      },
    };
  }
}
</script>
</body>
</html>
